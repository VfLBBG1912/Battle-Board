<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Dashboard – Battle Board</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

<header>
  <h1>🏆 Dashboard</h1>
  <p id="cycle-info"></p>

  <nav class="tabs">
    <a class="tab active" href="index.html">Dashboard</a>
    <a class="tab" href="players.html">Spieler</a>
    <a class="tab" href="halloffame.html">Hall of Fame</a>
  </nav>
</header>

<main class="page">

  <section class="card">
    <div class="dash-head">
      <div>
        <h2>⚔️ Team Stand</h2>
        <div class="muted" id="dash-subtitle">Lade Daten…</div>
      </div>
      <div class="pill" id="cycle-pill">Battle Cycle</div>
    </div>

    <div class="team-grid" id="team-container"></div>
  </section>

  <section class="card">
    <h2>🥇 Top Spieler</h2>
    <div class="muted">Live aus XP / Level / Challenge-Siegen</div>

    <div class="top-grid">
      <div class="top-card">
        <div class="top-title">⭐ Top Level</div>
        <div id="top-level"></div>
      </div>

      <div class="top-card">
        <div class="top-title">⚡ Top XP</div>
        <div id="top-xp"></div>
      </div>

      <div class="top-card">
        <div class="top-title">🎯 Top Challenges</div>
        <div id="top-challenges"></div>
      </div>
    </div>
  </section>

  <section class="card">
    <h2>🔥 Letzte Updates</h2>
    <div id="updates-container" class="feed"></div>
  </section>

</main>

<footer>
  <p>Battle Mode Activated ⚽</p>
</footer>

<script src="app.js"></script>
</body>
</html>
