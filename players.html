<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Spieler – Battle Board</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

<header>
  <h1>👥 Spieler</h1>
  <p id="cycle-info"></p>

  <nav class="tabs">
    <a class="tab" href="index.html">Dashboard</a>
    <a class="tab active" href="players.html">Spieler</a>
    <a class="tab" href="halloffame.html">Hall of Fame</a>
  </nav>
</header>

<main class="page">
  <section class="card">
    <div class="players-top">
      <div class="players-title">
        <h2>📊 Übersicht</h2>
        <div class="muted" id="players-summary">Lade Daten…</div>
      </div>

      <div class="controls">
        <input id="player-search" class="search" placeholder="Spieler suchen…" />

        <select id="sort" class="select">
          <option value="level">Sortierung: Level/XP</option>
          <option value="xp">Sortierung: XP</option>
          <option value="challenges">Sortierung: Challenge Siege</option>
          <option value="seasonStars">Sortierung: Season-Sterne</option>
          <option value="name">Sortierung: Name (A–Z)</option>
        </select>
      </div>

      <div class="chips">
        <button class="chip active" data-team="all">Alle</button>
        <button class="chip chip-alpha" data-team="Alpha Team">Alpha Team</button>
        <button class="chip chip-bravo" data-team="Team Bravo">Team Bravo</button>
        <button class="chip chip-joker" data-team="Joker">Joker</button>
      </div>
    </div>
  </section>

  <section class="card">
    <div id="players-page-container"></div>
  </section>
</main>

<footer>
  <p>Battle Mode Activated ⚽</p>
</footer>

<script src="players.js"></script>
</body>
</html>
